<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toriix — WASM Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e2e; }
    #loading {
      position: absolute; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      color: #cdd6f4; font-family: system-ui, sans-serif; font-size: 1.1rem;
      pointer-events: none;
    }
    #error {
      display: none; position: absolute; inset: 0; z-index: 10;
      align-items: center; justify-content: center; flex-direction: column; gap: 1rem;
      color: #f38ba8; font-family: system-ui, sans-serif; padding: 2rem; text-align: center;
    }
  </style>
</head>
<body>
  <div id="loading">Loading Toriix...</div>
  <div id="error">
    <p id="error-message"></p>
    <p style="color: #a6adc8; font-size: 0.9rem;">
      WebGPU is required. Try Chrome 113+, Edge 113+, or Firefox Nightly with <code>dom.webgpu.enabled</code>.
    </p>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
