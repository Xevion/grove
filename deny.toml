[graph]
all-features = true

[advisories]
ignore = [
    # All transitive through gpui — nothing we can do until upstream fixes them
    "RUSTSEC-2025-0052", # async-std unmaintained
    "RUSTSEC-2024-0384", # instant unmaintained
    "RUSTSEC-2024-0436", # paste unmaintained
]

[bans]
multiple-versions = "warn"
wildcards = "allow" # gpui git deps have no version spec; we can't control this

[sources]
unknown-registry = "deny"
unknown-git = "allow"
allow-git = [
    "https://github.com/zed-industries/zed",
    "https://github.com/rust-lang/stacker",
]
