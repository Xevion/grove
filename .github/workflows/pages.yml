name: GitHub Pages (WASM Demo)

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-wasm:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly + wasm target
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.117

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libfontconfig-dev \
            libgit2-dev \
            libglib2.0-dev \
            libssl-dev \
            libva-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-xcb-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libzstd-dev \
            cmake \
            clang \
            lld

      - name: Build WASM (release)
        run: cargo build --lib --target wasm32-unknown-unknown --release

      - name: Generate JS bindings
        run: |
          wasm-bindgen \
            target/wasm32-unknown-unknown/release/grove.wasm \
            --out-dir www/wasm \
            --target web \
            --no-typescript

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: www

  deploy:
    needs: build-wasm
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
